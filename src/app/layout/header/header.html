<header class="h-16 flex justify-between items-center bg-cyan-600 dark:bg-cyan-800 text-white shadow-md px-4 select-none z-10">
  <div class="flex items-center gap-3">
    <!-- Botón de colapso usando PrimeNG y PrimeIcons -->
    <p-button
      icon="pi pi-bars"
      [text]="true"
      [plain]="true"
      styleClass="text-white hover:bg-cyan-700/50 p-2 rounded-lg"
      (click)="toggleSidebar.emit()"
      aria-label="Toggle sidebar">
    </p-button>
    <span class="text-xl font-bold tracking-wide">HardSystem</span>
  </div>

  <div class="flex items-center gap-2">
    <p-button
      icon="pi pi-bell"
      [text]="true"
      [plain]="true"
      styleClass="text-white hover:bg-cyan-700/50 p-2 rounded-lg"
      aria-label="Notificaciones">
    </p-button>
    <p-button
      icon="pi pi-user"
      [text]="true"
      [plain]="true"
      styleClass="text-white hover:bg-cyan-700/50 p-2 rounded-lg"
      aria-label="Perfil de usuario">
    </p-button>
  </div>
</header>
