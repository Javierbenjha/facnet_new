<div class="flex gap-2 items-center">
  <p-select
    [options]="companiesOptions()"
    [ngModel]="selectedCia()"
    (ngModelChange)="selectedCia.set($event)"
    optionLabel="label"
    optionValue="value"
    placeholder="Seleccionar"
  />

  <p-select
    [options]="branchesOptions()"
    [ngModel]="selectedBranch()"
    (ngModelChange)="selectedBranch.set($event)"
    optionLabel="label"
    optionValue="value"
    placeholder="Seleccionar"
    (onChange)="onBranchChange($event.value)"
  />
</div>
