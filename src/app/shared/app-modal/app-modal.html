<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [closable]="closable()"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: width() }"
  styleClass="!rounded-2xl"
  appendTo="body"
  (onHide)="onHide()">

  <ng-template pTemplate="header">
    <div class="flex items-center gap-2.5">
      @if (icon()) {
        <span class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 {{ iconBg() }}">
          <i class="text-sm {{ iconCls() }} {{ icon() }}"></i>
        </span>
      }
      <span class="font-semibold text-lg text-stone-800 dark:text-stone-100">{{ title() }}</span>
    </div>
  </ng-template>

  <ng-content />

  <ng-template pTemplate="footer">
    <ng-content select="[modal-footer]" />
  </ng-template>

</p-dialog>
