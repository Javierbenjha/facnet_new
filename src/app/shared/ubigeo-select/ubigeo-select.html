<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
  <!-- Departamento -->
  <div class="flex flex-col gap-2">
    <label class="text-surface-900 dark:text-surface-0 font-medium leading-normal"
      >Departamento <span class="text-red-500">*</span></label
    >
    <p-select
      [options]="departments()"
      optionLabel="nombre"
      optionValue="codigo"
      [ngModel]="selectedDept()"
      (ngModelChange)="onDeptChange($event)"
      placeholder="Seleccionar"
      styleClass="w-full"
       appendTo="body"
    />
  </div>

  <!-- Provincia -->
  <div class="flex flex-col gap-2">
    <label class="text-surface-900 dark:text-surface-0 font-medium leading-normal"
      >Provincia <span class="text-red-500">*</span></label
    >
    <p-select
      [options]="provinces()"
      optionLabel="nombre"
      optionValue="codigo"
      [ngModel]="selectedProv()"
      (ngModelChange)="onProvChange($event)"
      [disabled]="!selectedDept()"
      placeholder="Seleccionar"
      styleClass="w-full"
      appendTo="body"
    />
  </div>

  <!-- Distrito -->
  <div class="flex flex-col gap-2">
    <label class="text-surface-900 dark:text-surface-0 font-medium leading-normal"
      >Distrito <span class="text-red-500">*</span></label
    >
    <p-select
      [options]="districts()"
      optionLabel="nombre"
      optionValue="codigo"
      [ngModel]="selectedDist()"
      (ngModelChange)="onDistChange($event)"
      [disabled]="!selectedProv()"
      placeholder="Seleccionar"
      styleClass="w-full"
      appendTo="body"
    />
  </div>
</div>
