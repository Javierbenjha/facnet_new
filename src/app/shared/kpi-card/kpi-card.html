<div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-xl p-4 flex items-center justify-between gap-3 min-h-[88px]">
  <div class="flex flex-col gap-1 min-w-0">
    <span class="text-xs font-medium text-stone-400 uppercase tracking-wide truncate">{{ label() }}</span>
    <span class="text-xl font-bold tabular-nums truncate" [class]="colors().valueColor">{{ value() }}</span>
    @if (subtitle()) {
      <span class="text-xs text-stone-400 truncate">{{ subtitle() }}</span>
    }
  </div>
  <div class="w-11 h-11 rounded-full flex items-center justify-center shrink-0" [class]="colors().iconBg">
    <i class="pi text-lg" [class]="icon() + ' ' + colors().iconColor"></i>
  </div>
</div>
