<!-- Left panel: branding (hidden on mobile) -->
<aside
  class="hidden lg:flex lg:w-1/2 relative flex-col justify-between overflow-hidden p-12 xl:p-16 text-white bg-gradient-to-br from-[#0a2138] via-[#0d2c4a] to-[#061523]"
>
  <!-- Decorative shapes -->
  <div class="pointer-events-none absolute inset-0 opacity-40">
    <div class="absolute top-12 right-20 w-40 h-40 border border-white/10 rounded-3xl rotate-12"></div>
    <div class="absolute top-24 right-40 w-24 h-24 border border-white/10 rounded-2xl -rotate-6"></div>
    <div class="absolute bottom-0 left-0 w-72 h-72 border border-white/5 rounded-full -translate-x-1/3 translate-y-1/3"></div>
  </div>

  <!-- Brand label -->
  <div class="relative z-10 text-sm font-semibold tracking-[0.25em] text-sky-300/90 uppercase">
    HS Peru · ERP
  </div>

  <!-- Hero content -->
  <div class="relative z-10 flex flex-col gap-8 max-w-md">
    <h1 class="text-4xl xl:text-5xl font-bold leading-tight">
      Gestiona todo tu negocio en un solo lugar.
    </h1>
    <p class="text-base xl:text-lg text-sky-100/70 leading-relaxed">
      Facturación, inventario y reportes en tiempo real. La plataforma de soluciones
      informáticas hecha para crecer contigo.
    </p>
    <ul class="flex flex-col gap-4 text-sky-50/90">
      @for (feature of features; track feature) {
        <li class="flex items-center gap-3">
          <span
            class="flex items-center justify-center w-6 h-6 rounded-full bg-sky-400/20 text-sky-300 shrink-0"
          >
            <i class="pi pi-check text-xs"></i>
          </span>
          <span class="leading-normal">{{ feature }}</span>
        </li>
      }
    </ul>
  </div>

  <!-- Footer -->
  <div class="relative z-10 text-sm text-sky-100/40">
    © {{ year }} HS Perú · Soluciones Informáticas
  </div>
</aside>
