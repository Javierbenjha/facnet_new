<div class="max-w-7xl mx-auto">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100 tracking-tight">Módulo de Ventas</h1>
    <p class="text-gray-500 dark:text-gray-400 mt-1">Gestioná tus operaciones de venta, caja, cobranzas y comprobantes.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (item of subModules; track item.route) {
      <div class="hover:shadow-xl hover:-translate-y-1 transition-all duration-300 border border-gray-100 dark:border-gray-800 rounded-2xl bg-white dark:bg-gray-900 flex flex-col justify-between h-full p-6 shadow-sm">
        <div>
          <div class="flex items-center gap-4 pb-4">
            <div class="p-3 bg-cyan-50 dark:bg-cyan-950/40 text-cyan-600 dark:text-cyan-400 rounded-xl">
              <i class="pi" [class]="item.icon" style="font-size: 1.5rem"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100">{{ item.title }}</h3>
          </div>
          <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed">{{ item.description }}</p>
        </div>
        <div class="flex justify-end border-t border-gray-50 dark:border-gray-800/50 pt-4 mt-6">
          <a [routerLink]="item.route"
             class="inline-flex items-center justify-center px-4 py-2 bg-cyan-600 hover:bg-cyan-700 active:bg-cyan-800 text-white font-semibold rounded-lg transition-colors text-sm select-none shadow-sm cursor-pointer">
            Acceder
          </a>
        </div>
      </div>
    }
  </div>
</div>
