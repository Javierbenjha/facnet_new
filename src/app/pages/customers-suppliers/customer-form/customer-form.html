<app-modal
  [visible]="visible()"
  (visibleChange)="$event || close()"
  (closed)="close()"
  [title]="modalTitle()"
  size="md">

  <form [formRoot]="form" (submit)="save(); $event.preventDefault()" class="flex flex-col gap-2 pt-1">

    <!-- ── Identificación ── -->
    <div class="flex flex-col gap-2">
      <h4 class="text-sm font-semibold text-stone-800 dark:text-stone-100">Identificación</h4>

      <div class="grid grid-cols-2 gap-3">

        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-stone-600 dark:text-stone-400">
            Tipo de documento <span class="text-red-400">*</span>
          </label>
          <p-select size="small"
            [options]="tipoDocOptions"
            optionLabel="label"
            optionValue="value"
            [ngModel]="model().tipo_documento"
            (ngModelChange)="model.update(m => ({ ...m, tipo_documento: $event }))"
            styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-stone-600 dark:text-stone-400">
            Número de documento <span class="text-red-400">*</span>
          </label>
          <p-inputgroup>
            <input pInputText pSize="small"
                   [formField]="form.numero_documento"
                   [placeholder]="docPlaceholder()"
                   class="font-mono" />
            <p-inputGroupAddon>
              <p-button icon="pi pi-search" severity="secondary" [text]="true" size="small"
                        [loading]="searching()"
                        (onClick)="buscarDocumento()" />
            </p-inputGroupAddon>
          </p-inputgroup>
          @if (searchError()) {
            <span class="text-xs text-red-500">{{ searchError() }}</span>
          }
        </div>

      </div>
    </div>

    <div class="border-t border-border"></div>

    <!-- ── Datos Personales / Empresa ── -->
    <div class="flex flex-col gap-2">
      <h4 class="text-sm font-semibold text-stone-800 dark:text-stone-100">
        @if (isRuc()) { Datos de la Empresa } @else { Datos Personales }
      </h4>

      @if (isRuc()) {
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-stone-600 dark:text-stone-400">
            Razón Social
            <span class="ml-1 text-xs font-normal text-stone-400">Auto-completado</span>
          </label>
          <input pInputText pSize="small" [formField]="form.nombre"
                 placeholder="Se completa con el botón Buscar" class="w-full" />
        </div>
      } @else {
        <div class="flex flex-col gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-stone-600 dark:text-stone-400">
              Nombre <span class="text-red-400">*</span>
            </label>
            <input pInputText pSize="small" [formField]="form.nombre"
                   placeholder="Nombre" class="w-full" />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-1">
              <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Apellido Paterno</label>
              <input pInputText pSize="small" [formField]="form.apellido_paterno"
                     placeholder="Apellido paterno" class="w-full" />
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Apellido Materno</label>
              <input pInputText pSize="small" [formField]="form.apellido_materno"
                     placeholder="Apellido materno" class="w-full" />
            </div>
          </div>
        </div>
      }

    </div>

    <div class="border-t border-border"></div>

    <!-- ── Contacto ── -->
    <div class="flex flex-col gap-2">
      <h4 class="text-sm font-semibold text-stone-800 dark:text-stone-100">Contacto</h4>
      <div class="grid grid-cols-2 gap-3">

        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Teléfono</label>
          <input pInputText pSize="small" [formField]="form.telefono"
                 placeholder="987654321" class="w-full" />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Email</label>
          <input pInputText pSize="small" type="email" [formField]="form.email"
                 placeholder="ejemplo@correo.com" class="w-full" />
        </div>

        <div class="col-span-2 flex flex-col gap-1">
          <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Dirección</label>
          <input pInputText pSize="small" [formField]="form.direccion"
                 placeholder="Av. Ejemplo 123, Lima" class="w-full" />
        </div>

      </div>
    </div>

    <div class="border-t border-border"></div>

    <!-- ── Ubicación ── -->
    <div class="flex flex-col gap-2">
      <h4 class="text-sm font-semibold text-stone-800 dark:text-stone-100">Ubicación</h4>
      <div class="grid grid-cols-3 gap-3">

        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Departamento</label>
          <p-select
            [options]="departamentos()"
            optionLabel="nombre"
            optionValue="codigo"
            [ngModel]="model().departamento"
            (ngModelChange)="setDep($event)"
            placeholder="Seleccionar"
            [filter]="true"
            filterPlaceholder="Buscar..."
            appendTo="body"
            styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Provincia</label>
          <p-select
            [options]="provincias()"
            optionLabel="nombre"
            optionValue="codigo"
            [ngModel]="model().provincia"
            (ngModelChange)="setProv($event)"
            placeholder="Seleccionar"
            [filter]="true"
            filterPlaceholder="Buscar..."
            [disabled]="!model().departamento"
            appendTo="body"
            styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Distrito</label>
          <p-select
            [options]="distritos()"
            optionLabel="nombre"
            optionValue="codigo"
            [ngModel]="model().distrito"
            (ngModelChange)="model.update(m => ({ ...m, distrito: $event }))"
            placeholder="Seleccionar"
            [filter]="true"
            filterPlaceholder="Buscar..."
            [disabled]="!model().provincia"
            appendTo="body"
            styleClass="w-full" />
        </div>

      </div>
    </div>

  </form>

  <div modal-footer class="flex gap-2 justify-end">
    <p-button label="Cancelar" severity="secondary" [outlined]="true" size="small" (onClick)="close()" />
    <p-button label="Guardar" icon="pi pi-check" size="small" [loading]="saving()" (onClick)="save()" />
  </div>

</app-modal>
