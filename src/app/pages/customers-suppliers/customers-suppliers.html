<div class="p-6 flex flex-col gap-5">

  <app-page-header
    title="Clientes y Proveedores"
    [subtitle]="headerSubtitle()">
    <p-button
      [label]="tab() === 'CLIENTE' ? 'Nuevo cliente' : 'Nuevo proveedor'"
      icon="pi pi-plus"
      size="small"
      (onClick)="addNew()" />
  </app-page-header>

  <div class="grid grid-cols-3 gap-4">
    <app-kpi-card
      [label]="tab() === 'CLIENTE' ? 'Total clientes' : 'Total proveedores'"
      [value]="stats().total.toString()"
      subtitle="en total"
      icon="pi-users"
      variant="info" />
    <app-kpi-card
      label="Activos"
      [value]="stats().activos.toString()"
      subtitle="habilitados"
      icon="pi-check-circle"
      variant="success" />
    <app-kpi-card
      label="Inactivos"
      [value]="stats().inactivos.toString()"
      subtitle="deshabilitados"
      icon="pi-times-circle"
      variant="danger" />
  </div>

  <app-customers-suppliers-table
    [personas]="personas()"
    [tab]="tab()"
    (tabChange)="tab.set($event)"
    (editPersona)="edit($event)"
    (editDireccion)="onEditDireccion($event)"
    (toggleEstado)="onToggleEstado($event)" />

</div>

<app-direccion-modal
  [persona]="editingDireccion()"
  (closed)="onCloseDireccion($event)" />

<app-customer-form
  [editing]="editing()"
  [tipoPersona]="tab()"
  (closed)="close()"
  (saved)="onSaved($event)" />
