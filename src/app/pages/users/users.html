<div class="p-6 flex flex-col gap-5">

  <!-- Encabezado -->
  <div class="flex items-center justify-between gap-4">
    <div>
      <h1 class="text-xl font-semibold text-stone-900 dark:text-stone-100 tracking-tight">Usuarios</h1>
      <p class="text-sm text-stone-500 mt-0.5">{{ users().length }} usuarios · Inventario por sucursal · Andina Retail</p>
    </div>
    <div class="flex items-center gap-2">
      <p-button label="Exportar"       icon="pi pi-download" severity="secondary" [outlined]="true" size="small" />
      <p-button label="Importar"       icon="pi pi-upload"   severity="secondary" [outlined]="true" size="small" />
      <p-button label="Nuevo usuario" icon="pi pi-plus"     size="small" (onClick)="openNew()" />
    </div>
  </div>

  <!-- KPIs -->
  <div class="grid grid-cols-4 gap-3.5">

    <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-xl p-4 flex flex-col gap-1.5">
      <span class="text-xs font-medium text-stone-400 uppercase tracking-wide">Total SKUs</span>
      <span class="text-3xl font-semibold text-stone-900 dark:text-stone-100 tabular-nums">{{ kpis().total }}</span>
      <span class="text-xs text-stone-400">en catálogo</span>
    </div>


  </div>


</div>
