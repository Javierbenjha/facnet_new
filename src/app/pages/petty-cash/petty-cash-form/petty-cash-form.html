<app-modal [visible]="visible()" [title]="modalTitle()" size="md" (closed)="close()">

  <div class="flex flex-col gap-3 pt-1">

    <!-- Toggle EGRESO / INGRESO -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Tipo de Movimiento</label>
      <p-selectbutton
        [options]="opcionesTipo"
        [ngModel]="tipo()"
        (ngModelChange)="setTipo($event)"
        optionLabel="label"
        optionValue="value"
        styleClass="w-full" />
    </div>

    <!-- Serie (auto) + Motivo -->
    <div class="grid grid-cols-3 gap-3">

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Serie</label>
        <input pInputText pSize="small" [ngModel]="serie()" [disabled]="true"
          class="!bg-stone-50 dark:!bg-stone-800 !text-stone-400 font-mono" />
      </div>

      <div class="col-span-2 flex flex-col gap-1">
        <label class="text-sm font-medium text-stone-600 dark:text-stone-400">
          Motivo <span class="text-red-400">*</span>
        </label>
        <p-select
          [options]="motivosFiltrados()"
          [ngModel]="motivo()"
          (ngModelChange)="motivo.set($event)"
          optionLabel="descripcion"
          placeholder="Seleccioná..."
          [filter]="true"
          filterBy="descripcion"
          filterMatchMode="contains"
          filterPlaceholder="Buscar motivo..."
          (onFilter)="onFilterMotivo($event)"
          appendTo="body"
          size="small"
          styleClass="w-full">
          <ng-template #footer>
            <div class="p-2 border-t border-border">
              <p-button
                [label]="labelAgregar()"
                icon="pi pi-plus" [text]="true" severity="secondary"
                size="small" fluid
                [disabled]="!filterMotivo().trim()"
                [loading]="guardandoMotivo()"
                (onClick)="agregarMotivo()" />
            </div>
          </ng-template>
        </p-select>
      </div>

    </div>

    <!-- Fecha / Entregado a -->
    <div class="grid grid-cols-2 gap-3">

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-stone-600 dark:text-stone-400">
          Fecha <span class="text-red-400">*</span>
        </label>
        <p-datepicker
          [ngModel]="fecha()"
          (ngModelChange)="fecha.set($event)"
          dateFormat="dd/mm/yy"
          appendTo="body"
          size="small"
          styleClass="w-full" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-stone-600 dark:text-stone-400">
          Entregado a <span class="text-red-400">*</span>
        </label>
        <input pInputText pSize="small"
          [ngModel]="entregadoA()"
          (ngModelChange)="entregadoA.set($event)"
          placeholder="Nombre de la persona" />
      </div>

    </div>

    <!-- Moneda / Importe -->
    <div class="grid grid-cols-2 gap-3">

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Moneda</label>
        <p-select
          [options]="monedas"
          [ngModel]="moneda()"
          (ngModelChange)="moneda.set($event)"
          optionLabel="descripcion"
          appendTo="body"
          size="small"
          styleClass="w-full" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-stone-600 dark:text-stone-400">
          Importe <span class="text-red-400">*</span>
        </label>
        <p-inputnumber
          [ngModel]="importe()"
          (ngModelChange)="importe.set($event ?? 0)"
          [minFractionDigits]="2"
          [maxFractionDigits]="2"
          [min]="0"
          mode="decimal"
          [prefix]="moneda().sigla + ' '"
          size="small"
          styleClass="w-full" />
      </div>

    </div>

    <!-- Detalle -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-stone-600 dark:text-stone-400">Detalle del documento</label>
      <textarea pTextarea
        [ngModel]="detalle()"
        (ngModelChange)="detalle.set($event)"
        placeholder="Describa detalladamente el concepto del gasto..."
        rows="3"
        class="resize-none w-full">
      </textarea>
    </div>

  </div>

  <!-- Footer -->
  <div modal-footer class="flex justify-end gap-2">
    <p-button label="Cancelar" severity="secondary" [outlined]="true" size="small" (onClick)="close()" />
    <p-button
      [label]="tipo() === 'INGRESO' ? 'Registrar Ingreso' : 'Registrar Egreso'"
      [severity]="tipo() === 'INGRESO' ? 'success' : 'danger'"
      size="small"
      [disabled]="!esValido()"
      [loading]="guardandoRecibo()"
      (onClick)="registrar()" />
  </div>

</app-modal>
