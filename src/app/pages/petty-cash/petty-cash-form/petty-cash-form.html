<app-modal
  [visible]="visible()"
  [title]="tipo() === 'INGRESO' ? 'Nuevo Ingreso' : 'Nuevo Egreso'"
  size="md"
  (closed)="close()">

  <div class="flex flex-col gap-4">

    <!-- Tipo de Movimiento -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">Tipo de Movimiento</label>
      <div class="flex gap-2">
        <button type="button"
          class="flex-1 py-2 rounded-lg border text-sm font-medium transition-colors"
          [class.bg-red-50]="tipo() === 'EGRESO'"
          [class.dark:bg-red-900\/20]="tipo() === 'EGRESO'"
          [class.border-red-400]="tipo() === 'EGRESO'"
          [class.text-red-600]="tipo() === 'EGRESO'"
          [class.bg-surface-card]="tipo() !== 'EGRESO'"
          [class.border-border]="tipo() !== 'EGRESO'"
          [class.text-stone-500]="tipo() !== 'EGRESO'"
          (click)="setTipo('EGRESO')">
          <i class="pi pi-arrow-circle-up mr-1.5"></i>Egreso
        </button>
        <button type="button"
          class="flex-1 py-2 rounded-lg border text-sm font-medium transition-colors"
          [class.bg-emerald-50]="tipo() === 'INGRESO'"
          [class.dark:bg-emerald-900\/20]="tipo() === 'INGRESO'"
          [class.border-emerald-400]="tipo() === 'INGRESO'"
          [class.text-emerald-600]="tipo() === 'INGRESO'"
          [class.bg-surface-card]="tipo() !== 'INGRESO'"
          [class.border-border]="tipo() !== 'INGRESO'"
          [class.text-stone-500]="tipo() !== 'INGRESO'"
          (click)="setTipo('INGRESO')">
          <i class="pi pi-arrow-circle-down mr-1.5"></i>Ingreso
        </button>
      </div>
    </div>

    <!-- Fecha / Monto -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">Fecha</label>
        <p-datepicker
          [ngModel]="fecha()"
          (ngModelChange)="fecha.set($event)"
          dateFormat="dd/mm/yy"
          appendTo="body"
          styleClass="w-full"
          inputStyleClass="!text-sm" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">Monto (S/)</label>
        <p-inputnumber
          [ngModel]="monto()"
          (ngModelChange)="monto.set($event ?? 0)"
          [minFractionDigits]="2"
          [maxFractionDigits]="2"
          [min]="0"
          mode="decimal"
          styleClass="w-full"
          inputStyleClass="!text-sm" />
      </div>
    </div>

    <!-- Concepto -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">
        Concepto <span class="text-red-400 normal-case">*</span>
      </label>
      <input pInputText
        [ngModel]="concepto()"
        (ngModelChange)="concepto.set($event)"
        placeholder="Descripción del movimiento"
        class="!text-sm" />
    </div>

    <!-- Categoría / Responsable -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">
          Categoría <span class="text-red-400 normal-case">*</span>
        </label>
        <p-select
          [options]="categorias()"
          [ngModel]="categoria()"
          (ngModelChange)="categoria.set($event)"
          placeholder="Seleccioná..."
          appendTo="body"
          styleClass="w-full" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">Responsable</label>
        <input pInputText
          [ngModel]="responsable()"
          (ngModelChange)="responsable.set($event)"
          placeholder="Nombre"
          class="!text-sm" />
      </div>
    </div>

    <!-- Comprobante -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">Comprobante</label>
      <input pInputText
        [ngModel]="comprobante()"
        (ngModelChange)="comprobante.set($event)"
        placeholder="Boleta N° / Factura N° / Recibo N°"
        class="!text-sm" />
    </div>

    <!-- Observaciones -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">Observaciones</label>
      <textarea pTextarea
        [ngModel]="observaciones()"
        (ngModelChange)="observaciones.set($event)"
        placeholder="Notas adicionales..."
        rows="2"
        class="!text-sm resize-none w-full">
      </textarea>
    </div>

  </div>

  <!-- Footer -->
  <div modal-footer class="flex justify-end gap-2">
    <p-button label="Cancelar" severity="secondary" [outlined]="true" size="small" (onClick)="close()" />
    <p-button
      [label]="tipo() === 'INGRESO' ? 'Registrar Ingreso' : 'Registrar Egreso'"
      [severity]="tipo() === 'INGRESO' ? 'success' : 'danger'"
      size="small"
      [disabled]="!esValido()"
      (onClick)="registrar()" />
  </div>

</app-modal>
