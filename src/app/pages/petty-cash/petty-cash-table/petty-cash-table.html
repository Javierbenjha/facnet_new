<!-- Cell templates -->

<ng-template #fechaCellTpl let-m>
  <span class="whitespace-nowrap text-sm text-stone-600 dark:text-stone-300">{{ fmtDate(m.fecha) }}</span>
</ng-template>

<ng-template #tipoCellTpl let-m>
  <p-tag [value]="m.tipo" [severity]="tipoSev(m.tipo)" styleClass="!text-xs" />
</ng-template>

<ng-template #serieCellTpl let-m>
  <span class="font-mono text-xs text-stone-500 dark:text-stone-400">{{ m.serie }}</span>
</ng-template>

<ng-template #motivoCellTpl let-m>
  <div>
    <p class="text-sm font-medium text-stone-800 dark:text-stone-100 max-w-[180px] truncate">{{ m.motivo }}</p>
    @if (m.detalle) {
      <p class="text-[11px] text-stone-400 max-w-[180px] truncate">{{ m.detalle }}</p>
    }
  </div>
</ng-template>

<ng-template #entregadoCellTpl let-m>
  <span class="text-sm text-stone-500">{{ m.entregado_a }}</span>
</ng-template>

<ng-template #importeCellTpl let-m>
  <span class="text-sm font-semibold tabular-nums whitespace-nowrap"
    [class.text-emerald-600]="m.tipo === 'INGRESO'"
    [class.text-red-500]="m.tipo === 'EGRESO'">
    {{ m.tipo === 'INGRESO' ? '+' : '-' }} {{ m.sigla }} {{ fmtNum(m.importe) }}
  </span>
</ng-template>

<ng-template #estadoCellTpl let-m>
  <p-tag [value]="m.estado" [severity]="estadoSev(m.estado)" styleClass="!text-xs" />
</ng-template>

<ng-template #actionCellTpl let-m>
  <div (click)="$event.stopPropagation()">
    <p-button icon="pi pi-ellipsis-v" [text]="true" severity="secondary" size="small"
      (onClick)="rowMenu.toggle($event)" />
    <p-menu #rowMenu [popup]="true" [model]="getMenuItems(m)" appendTo="body" />
  </div>
</ng-template>

<!-- Layout -->
<div class="bg-surface-card border border-border rounded-xl overflow-hidden">

  <!-- Filtros -->
  <div class="flex items-center gap-2 p-3.5 border-b border-border flex-wrap">

    <p-iconfield>
      <p-inputicon><i class="pi pi-search"></i></p-inputicon>
      <input pInputText pSize="small" type="text"
        [ngModel]="searchText()"
        (ngModelChange)="searchText.set($event)"
        placeholder="Motivo, serie, entregado a..."
        class="w-56" />
    </p-iconfield>

    <p-datepicker
      [ngModel]="startDate()"
      (ngModelChange)="startDate.set($event)"
      dateFormat="dd/mm/yy"
      placeholder="Desde"
      appendTo="body"
      styleClass="w-36"
      inputStyleClass="!py-[0.375rem] !text-sm" />

    <p-datepicker
      [ngModel]="endDate()"
      (ngModelChange)="endDate.set($event)"
      dateFormat="dd/mm/yy"
      placeholder="Hasta"
      appendTo="body"
      styleClass="w-36"
      inputStyleClass="!py-[0.375rem] !text-sm" />

    <p-select
      [options]="tipoOpciones"
      [ngModel]="tipoFiltro()"
      (ngModelChange)="tipoFiltro.set($event)"
      optionLabel="label"
      optionValue="value"
      size="small"
      appendTo="body"
      styleClass="w-36" />

    <span class="ml-auto text-xs text-stone-400">{{ filteredMovimientos().length }} resultados</span>

    <p-button icon="pi pi-refresh" [text]="true" severity="secondary" size="small"
      pTooltip="Limpiar filtros" (onClick)="clearFilters()" />

  </div>

  <app-data-table
    [data]="filteredMovimientos()"
    [columns]="tableColumns()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    [scrollable]="true"
    emptyMessage="No se encontraron movimientos"
    (rowClick)="viewDetail.emit($any($event))" />

</div>
