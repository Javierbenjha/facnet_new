<!-- Cell templates -->

<ng-template #fechaCellTpl let-r>
  <span class="whitespace-nowrap text-sm text-stone-600 dark:text-stone-300">{{ fmtDate(r.fecha) }}</span>
</ng-template>

<ng-template #tipoCellTpl let-r>
  <p-tag [value]="tipoLabel(r)" [severity]="tipoSev(r)" styleClass="!text-xs" />
</ng-template>

<ng-template #numeroCellTpl let-r>
  <span class="font-mono text-xs text-stone-500 dark:text-stone-400">{{ r.numero }}</span>
</ng-template>

<ng-template #motivoCellTpl let-r>
  <div>
    <p class="text-sm font-medium text-stone-800 dark:text-stone-100 max-w-[180px] truncate">{{ r.motivoDescripcion }}</p>
    @if (r.observacion) {
      <p class="text-[11px] text-stone-400 max-w-[180px] truncate">{{ r.observacion }}</p>
    }
  </div>
</ng-template>

<ng-template #entregadoCellTpl let-r>
  <span class="text-sm text-stone-500">{{ r.entregado }}</span>
</ng-template>

<ng-template #monedaCellTpl let-r>
  <span class="text-xs text-stone-500 dark:text-stone-400">{{ r.monedaDescripcion ?? sigla(r) }}</span>
</ng-template>

<ng-template #importeCellTpl let-r>
  <span class="text-sm font-semibold tabular-nums whitespace-nowrap"
    [class.text-emerald-600]="r.tip_doc === 77"
    [class.text-red-500]="r.tip_doc === 78">
    {{ r.tip_doc === 77 ? '+' : '-' }} {{ sigla(r) }} {{ fmtNum(r.importe) }}
  </span>
</ng-template>

<ng-template #estadoCellTpl let-r>
  <p-tag [value]="r.estadoDescripcion ?? ''" [severity]="estadoSev(r)" styleClass="!text-xs" />
</ng-template>

<ng-template #actionCellTpl let-r>
  <div (click)="$event.stopPropagation()">
    <p-button icon="pi pi-ellipsis-v" [text]="true" severity="secondary" size="small"
      (onClick)="openRowMenu($event, r, rowMenu)" />
    <p-menu #rowMenu [popup]="true" [model]="rowMenuItems()" appendTo="body" />
  </div>
</ng-template>

<!-- Layout -->
<div class="bg-surface-card border border-border rounded-xl overflow-hidden">

  <!-- Filtros -->
  <div class="flex items-center gap-2 p-3.5 border-b border-border flex-wrap">

    <p-iconfield>
      <p-inputicon><i class="pi pi-search"></i></p-inputicon>
      <input pInputText pSize="small" type="text"
        [ngModel]="searchText()"
        (ngModelChange)="searchText.set($event)"
        placeholder="Motivo, número, entregado a..."
        class="w-56" />
    </p-iconfield>

    <p-datepicker
      [ngModel]="startDate()"
      (ngModelChange)="startDate.set($event)"
      dateFormat="dd/mm/yy"
      placeholder="Desde"
      appendTo="body"
      styleClass="w-36"
      inputStyleClass="!py-[0.375rem] !text-sm" />

    <p-datepicker
      [ngModel]="endDate()"
      (ngModelChange)="endDate.set($event)"
      dateFormat="dd/mm/yy"
      placeholder="Hasta"
      appendTo="body"
      styleClass="w-36"
      inputStyleClass="!py-[0.375rem] !text-sm" />

    <p-select
      [options]="tipoOpciones"
      [ngModel]="tipoFiltro()"
      (ngModelChange)="tipoFiltro.set($event)"
      optionLabel="label"
      optionValue="value"
      size="small"
      appendTo="body"
      styleClass="w-36" />

    <span class="ml-auto text-xs text-stone-400">{{ filteredReceipts().length }} resultados</span>

    <p-button icon="pi pi-refresh" [text]="true" severity="secondary" size="small"
      pTooltip="Limpiar filtros" (onClick)="clearFilters()" />

  </div>

  <app-data-table
    [data]="filteredReceipts()"
    [columns]="tableColumns()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    [scrollable]="true"
    emptyMessage="No se encontraron movimientos"
    (rowClick)="viewDetail.emit($any($event))" />

</div>
