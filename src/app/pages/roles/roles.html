<div class="p-6 flex flex-col gap-5">
  <!-- Encabezado -->
  <app-page-header
    title="Roles y Permisos"
    subtitle="{{ roles().length }} roles · Plantillas del sistema y roles propios de tu empresa"
  >
    <p-button label="Nuevo rol" icon="pi pi-plus" size="small" (onClick)="nuevo()" />
  </app-page-header>

  <!-- KPIs -->
  <div class="grid grid-cols-3 gap-3.5">
    <app-kpi-card
      label="Total Roles"
      [value]="kpis().total.toString()"
      subtitle="en el sistema"
      icon="pi-shield"
    />
    <app-kpi-card
      label="Del Sistema"
      [value]="kpis().sistema.toString()"
      subtitle="plantillas globales"
      icon="pi-lock"
      variant="info"
    />
    <app-kpi-card
      label="Personalizados"
      [value]="kpis().propios.toString()"
      subtitle="creados por tu empresa"
      icon="pi-user-edit"
      variant="success"
    />
  </div>

  <!-- Plantilla de la columna de acciones -->
  <ng-template #actions let-row>
    <div class="flex items-center justify-end gap-2">
      <p-button
        label="Editar"
        icon="pi pi-pencil"
        size="small"
        severity="secondary"
        [outlined]="true"
        [disabled]="!row.editable"
        (onClick)="update(row)"
      />
      <p-button
        label="Eliminar"
        icon="pi pi-trash"
        size="small"
        severity="danger"
        [text]="true"
        [disabled]="!row.editable"
        (onClick)="remove(row)"
      />
    </div>
  </ng-template>

  <!-- Tabla -->
  <div
    class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-xl overflow-hidden"
  >
    <app-data-table
      [columns]="columns"
      [data]="roles()"
      [actionTemplate]="actions"
      emptyMessage="No hay roles para mostrar"
    />
  </div>

  <app-role-form [editing]="editing()" (closed)="editing.set(null)" (saved)="onSaved()"/>
</div>
