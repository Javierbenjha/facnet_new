<div class="p-6 flex flex-col gap-5">

  <!-- Encabezado -->
  <app-page-header title="Productos" subtitle="{{ products().length }} productos · Inventario por sucursal · Andina Retail">
    <p-button label="Exportar" icon="pi pi-download" severity="secondary" [outlined]="true" size="small"
              (onClick)="exportExcel()" />
    <p-button label="Herramientas" icon="pi pi-cog" severity="secondary" [outlined]="true" size="small"
              (onClick)="toolMenu.toggle($event)" />
    <p-menu #toolMenu [model]="toolItems" [popup]="true" appendTo="body" />
    <p-button label="Nuevo producto" icon="pi pi-plus" size="small" (onClick)="openNew()" />
  </app-page-header>

  <!-- KPIs -->
  <div class="grid grid-cols-4 gap-3.5">

    <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-xl p-4 flex items-center justify-between gap-3">
      <div class="flex flex-col gap-1">
        <span class="text-xs font-medium text-stone-400 uppercase tracking-wide">Total Productos</span>
        <span class="text-3xl font-semibold text-stone-900 dark:text-stone-100 tabular-nums">{{ kpis().total }}</span>
        <span class="text-xs text-stone-400">en catálogo</span>
      </div>
      <div class="w-11 h-11 rounded-full bg-primary-light flex items-center justify-center shrink-0">
        <i class="pi pi-box text-primary text-lg"></i>
      </div>
    </div>

    <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-xl p-4 flex items-center justify-between gap-3">
      <div class="flex flex-col gap-1">
        <span class="text-xs font-medium text-stone-400 uppercase tracking-wide">Valor Inventario</span>
        <span class="text-2xl font-semibold text-stone-900 dark:text-stone-100 tabular-nums font-mono">{{ fmtCurrency(kpis().valorInventario) }}</span>
        <span class="text-xs text-stone-400">costo valorizado</span>
      </div>
      <div class="w-11 h-11 rounded-full bg-primary-light flex items-center justify-center shrink-0">
        <i class="pi pi-wallet text-primary text-lg"></i>
      </div>
    </div>

    <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-xl p-4 flex items-center justify-between gap-3">
      <div class="flex flex-col gap-1">
        <span class="text-xs font-medium text-stone-400 uppercase tracking-wide">Productos Activos</span>
        <span class="text-3xl font-semibold tabular-nums text-emerald-600">{{ kpis().activos }}</span>
        <span class="text-xs text-stone-400">habilitados</span>
      </div>
      <div class="w-11 h-11 rounded-full bg-emerald-100 flex items-center justify-center shrink-0">
        <i class="pi pi-check-circle text-emerald-600 text-lg"></i>
      </div>
    </div>

    <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-xl p-4 flex items-center justify-between gap-3">
      <div class="flex flex-col gap-1">
        <span class="text-xs font-medium text-stone-400 uppercase tracking-wide">Productos Inactivos</span>
        <span class="text-3xl font-semibold tabular-nums text-red-500">{{ kpis().inactivos }}</span>
        <span class="text-xs text-stone-400">deshabilitados</span>
      </div>
      <div class="w-11 h-11 rounded-full bg-red-100 flex items-center justify-center shrink-0">
        <i class="pi pi-times-circle text-red-500 text-lg"></i>
      </div>
    </div>

  </div>

  <!-- Tabla -->
  <app-products-table
    [products]="products()"
    (editProduct)="openEdit($event)" />

  <app-product-form
    [editing]="editing()"
    (closed)="closeModal()" />

</div>
