<div class="min-h-screen bg-surface-50 dark:bg-surface-950 py-10 px-4">
  <div class="mx-auto w-full max-w-6xl flex flex-col gap-8">
    <!-- Header -->
    <div class="flex flex-col gap-1">
      <img src="assets/images/logoHS.png" alt="HS Perú" class="h-10 w-auto self-start" />
      <p class="text-surface-500 dark:text-surface-300 leading-normal">
        Configure los datos de su empresa para comenzar
      </p>
    </div>

    <!-- Stepper -->
    <div class="flex items-center justify-center gap-4">
      <div class="flex items-center gap-2" [class.opacity-50]="step() !== 1">
        <span
          class="flex h-7 w-7 items-center justify-center rounded-full text-sm font-semibold"
          [ngClass]="
            step() === 1
              ? 'bg-primary text-primary-contrast'
              : 'bg-surface-200 dark:bg-surface-700 text-surface-700 dark:text-surface-200'
          "
          >1</span
        >
        <span class="text-surface-900 dark:text-surface-0 font-medium">Empresa</span>
      </div>

      <div class="h-px w-16 bg-surface-300 dark:bg-surface-700"></div>

      <div class="flex items-center gap-2" [class.opacity-50]="step() !== 2">
        <span
          class="flex h-7 w-7 items-center justify-center rounded-full text-sm font-semibold"
          [ngClass]="
            step() === 2
              ? 'bg-primary text-primary-contrast'
              : 'bg-surface-200 dark:bg-surface-700 text-surface-700 dark:text-surface-200'
          "
          >2</span
        >
        <span class="text-surface-700 dark:text-surface-200 font-medium">Sucursal</span>
      </div>
    </div>

    <!-- Step content -->
    @if (step() === 1) {
      <app-company-form [loading]="loading()" (submitted)="onCompanySubmit($event)" />
    } @else {
      <app-branch-form [loading]="loading()" (submitted)="onBranchSubmit($event)" />
    }
  </div>
</div>
