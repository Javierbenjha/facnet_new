<!-- Search -->
<div class="px-5 pt-3 pb-2 shrink-0">
  <p-iconfield>
    <p-inputicon class="pi pi-search" />
    <input pInputText type="text" placeholder="Buscar producto..."
      class="w-full"
      [value]="query()"
      (input)="queryChange.emit($any($event.target).value)" />
  </p-iconfield>
</div>

<!-- Category chips -->
<div class="px-5 pb-3 flex gap-1.5 flex-wrap shrink-0">
  @for (cat of categorias(); track cat) {
    <p-button [label]="cat" size="small"
      [outlined]="catActiva() !== cat"
      [severity]="catActiva() !== cat ? 'secondary' : undefined"
      (onClick)="catActivaChange.emit(cat)" />
  }
</div>

<!-- Product grid -->
<div class="flex-1 overflow-y-auto px-5 pb-5">
  <div class="grid gap-2.5" style="grid-template-columns: repeat(auto-fill, minmax(148px, 1fr))">

    @for (p of productos(); track p.id) {
      <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-xl p-2.5 cursor-pointer hover:border-primary hover:shadow-sm transition-all active:scale-[0.98]"
           (click)="productClick.emit(p)">
        <div [class]="p.color + ' h-20 rounded-lg mb-2 flex items-center justify-center font-mono text-[10px] text-stone-400'">
          {{ p.sku }}
        </div>
        <p class="text-[12.5px] font-medium leading-tight mb-1 line-clamp-2 min-h-8 text-stone-800 dark:text-stone-100">
          {{ p.descripcion }}
        </p>
        <p class="text-[13px] font-semibold tabular-nums text-stone-900 dark:text-stone-100">
          {{ sigla() }} {{ p.precio_publico.toFixed(2) }}
        </p>
        <p class="text-[10.5px] text-stone-400 mt-0.5">Stock: {{ p.stock }}</p>
      </div>
    }

    @empty {
      <div class="col-span-full py-16 flex flex-col items-center gap-3 text-stone-300">
        <i class="pi pi-search text-4xl"></i>
        <p class="text-sm">Sin resultados para "{{ query() }}"</p>
        <p-button
          label="Crear nuevo producto"
          icon="pi pi-plus-circle"
          severity="secondary"
          [outlined]="true"
          size="small"
          (onClick)="createProduct.emit()" />
      </div>
    }

  </div>
</div>
