<div class="px-5 py-3 bg-surface-card border-b border-border shrink-0 flex flex-col gap-2">

  <!-- Row 1: Cliente · Tipo Doc · Serie · Fecha -->
  <div class="flex items-end gap-3">

    <div class="flex-1 min-w-0">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Cliente</label>
      <p-iconfield class="mt-1">
        <p-inputicon class="pi pi-user" />
        <input pInputText pSize="small" type="text" placeholder="Buscar cliente o RUC..."
          class="w-full"
          [value]="cliente()"
          (input)="clienteChange.emit($any($event.target).value)" />
      </p-iconfield>
    </div>

    <div class="w-40 shrink-0">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Tipo Doc.</label>
      <p-select
        [options]="tiposDoc()"
        [ngModel]="tipoDoc()"
        (ngModelChange)="tipoDocChange.emit($event)"
        optionLabel="label"
        optionValue="value"
        size="small"
        appendTo="body"
        styleClass="w-full mt-1" />
    </div>

    <div class="w-16 shrink-0">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Serie</label>
      <input pInputText pSize="small" [value]="serie()" disabled class="w-full text-center mt-1" />
    </div>

    <div class="w-44 shrink-0">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Fecha Emisión</label>
      <p-datepicker
        [ngModel]="fechaEmision()"
        (ngModelChange)="fechaEmisionChange.emit($event)"
        [iconDisplay]="'input'"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        appendTo="body"
        styleClass="w-full mt-1"
        inputStyleClass="!py-[0.375rem] !text-sm" />
    </div>

  </div>

  <!-- Row 2: Moneda · Forma Pago · Descuento · Det/Ret toggle -->
  <div class="flex items-end gap-3">

    <div class="shrink-0">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Moneda</label>
      <div class="flex gap-1 mt-1">
        <p-button label="S/ PEN" size="small"
          [outlined]="moneda() !== 'PEN'"
          [severity]="moneda() !== 'PEN' ? 'secondary' : undefined"
          (onClick)="monedaChange.emit('PEN')" />
        <p-button label="$ USD" size="small"
          [outlined]="moneda() !== 'USD'"
          [severity]="moneda() !== 'USD' ? 'secondary' : undefined"
          (onClick)="monedaChange.emit('USD')" />
      </div>
    </div>

    <div class="shrink-0">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Forma de Pago</label>
      <div class="flex gap-1 mt-1">
        <p-button label="Contado" size="small"
          [outlined]="formaPago() !== 'contado'"
          [severity]="formaPago() !== 'contado' ? 'secondary' : undefined"
          (onClick)="formaPagoChange.emit('contado')" />
        <p-button label="Crédito" size="small"
          [outlined]="formaPago() !== 'credito'"
          [severity]="formaPago() !== 'credito' ? 'secondary' : undefined"
          (onClick)="formaPagoChange.emit('credito')" />
      </div>
    </div>

    <div class="shrink-0">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">IGV Incluido</label>
      <div class="flex gap-1 mt-1">
        <p-button label="Sí" size="small"
          [outlined]="!igvIncluido()"
          [severity]="!igvIncluido() ? 'secondary' : undefined"
          (onClick)="igvIncluidoChange.emit(true)" />
        <p-button label="No" size="small"
          [outlined]="igvIncluido()"
          [severity]="igvIncluido() ? 'secondary' : undefined"
          (onClick)="igvIncluidoChange.emit(false)" />
      </div>
    </div>

    <div class="w-40 shrink-0">
      <div class="flex justify-between items-center">
        <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Descuento</label>
        @if (descuento() > 0) {
          <span class="text-[10px] font-bold text-red-400 tabular-nums">{{ descuentoPct().toFixed(1) }}% del total</span>
        }
      </div>
      <p-inputnumber [ngModel]="descuento()" (ngModelChange)="descuentoChange.emit($event ?? 0)"
        [min]="0" [minFractionDigits]="2" [maxFractionDigits]="2"
        [prefix]="sigla() + ' '" styleClass="w-full mt-1" inputStyleClass="!py-[0.375rem] !text-sm text-right w-full" />
    </div>

    <div class="shrink-0 self-end mb-0.5">
      <p-button
        [label]="showDetRet() ? 'Det./Ret. ▲' : '+ Det./Ret.'"
        [severity]="showDetRet() ? 'warn' : 'secondary'"
        [text]="true"
        size="small"
        (onClick)="showDetRetChange.emit(!showDetRet())" />
    </div>

  </div>

  <!-- Row 3 (condicional): Fecha de vencimiento para crédito -->
  @if (formaPago() === 'credito') {
    <div class="flex items-end gap-3 pt-1 border-t border-dashed border-border">
      <div class="w-44 shrink-0">
        <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Fecha Vencimiento</label>
        <p-datepicker
          [ngModel]="fechaVencimiento()"
          (ngModelChange)="fechaVencimientoChange.emit($event)"
          [iconDisplay]="'input'"
          [showIcon]="true"
          dateFormat="dd/mm/yy"
          appendTo="body"
          styleClass="w-full mt-1"
          inputStyleClass="!py-[0.375rem] !text-sm" />
      </div>
    </div>
  }

  <!-- Row 4: Detracción / Retención (colapsable) -->
  @if (showDetRet()) {
    <div class="flex items-end gap-3 pt-1 border-t border-dashed border-border">

      <div class="flex-1 min-w-0">
        <label class="text-[10px] font-semibold text-blue-500 uppercase tracking-wide">Detracción</label>
        <p-select
          [options]="detracConceptos()"
          [ngModel]="detracConcepto()"
          (ngModelChange)="detracConceptoChange.emit($event)"
          optionLabel="descripcion"
          [showClear]="true"
          size="small"
          placeholder="Seleccionar concepto..."
          appendTo="body"
          [disabled]="aplicaRetencion()"
          styleClass="w-full mt-1" />
      </div>

      @if (detracConcepto()) {
        <div class="shrink-0 self-end">
          <div class="flex flex-col items-end gap-0.5 mb-1">
            <span class="text-[10px] text-blue-500 font-semibold">{{ detracConcepto()!.porcentaje }}%</span>
            <span class="text-xs font-bold tabular-nums text-blue-600">-{{ fmt(detracMonto()) }}</span>
          </div>
        </div>
      }

      <div class="w-px h-10 self-end mb-1 bg-border shrink-0"></div>

      <div class="shrink-0">
        <label class="text-[10px] font-semibold text-amber-500 uppercase tracking-wide">Retención</label>
        <div class="flex items-center gap-2 mt-1">
          <p-button
            size="small"
            [label]="aplicaRetencion() ? 'Aplicando ' + retencionPct() + '%' : 'Sin retención'"
            [icon]="aplicaRetencion() ? 'pi pi-check-circle' : 'pi pi-circle'"
            [severity]="aplicaRetencion() ? 'warn' : 'secondary'"
            [outlined]="!aplicaRetencion()"
            [disabled]="!!detracConcepto()"
            (onClick)="aplicaRetencionToggle.emit()" />
          @if (aplicaRetencion()) {
            <span class="text-sm font-bold tabular-nums text-amber-600 whitespace-nowrap">
              -{{ fmt(retencionMonto()) }}
            </span>
          }
        </div>
      </div>

    </div>
  }

</div>
