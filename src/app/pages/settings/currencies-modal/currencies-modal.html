<app-modal
  [(visible)]="visible"
  title="Monedas"
  icon="pi pi-dollar"
  iconColor="success"
  size="md">

  <div class="flex items-center justify-between mb-3">
    <span class="text-sm text-stone-400">
      {{ rows().length }} moneda{{ rows().length !== 1 ? 's' : '' }} configurada{{ rows().length !== 1 ? 's' : '' }}
    </span>
  </div>

  <p-table
    [value]="rows()"
    [loading]="loading()"
    dataKey="id"
    styleClass="p-datatable-sm">

    <ng-template pTemplate="header">
      <tr class="text-sm">
        <th class="w-10">#</th>
        <th>Descripción</th>
        <th class="w-24">Sigla</th>
        <th class="w-28">SUNAT</th>
        <th class="w-28 text-center">Estado</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row let-rowIndex="rowIndex">
      <tr>
        <td class="text-stone-400 text-xs">{{ rowIndex + 1 }}</td>
        <td class="font-medium text-sm">{{ row.descripcion }}</td>
        <td>
          <p-tag [value]="row.sigla" severity="secondary" />
        </td>
        <td class="font-mono text-xs text-stone-500">{{ row.sigla_sunat }}</td>
        <td class="text-center">
          <p-toggleswitch
            [ngModel]="row.active"
            [disabled]="row.toggling"
            (ngModelChange)="toggle(row)" />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center py-8 text-stone-400 text-sm">
          No hay monedas configuradas para esta empresa
        </td>
      </tr>
    </ng-template>

  </p-table>

</app-modal>
