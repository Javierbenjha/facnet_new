<app-modal
  [(visible)]="visible"
  title="Empresas de transporte"
  icon="pi pi-truck"
  iconColor="info"
  size="lg">

  <div class="flex items-center justify-between mb-3">
    <span class="text-sm text-stone-400">
      {{ rows().length }} empresa{{ rows().length !== 1 ? 's' : '' }} activa{{ rows().length !== 1 ? 's' : '' }}
    </span>
  </div>

  <p-table
    [value]="rows()"
    [loading]="loading()"
    dataKey="id"
    styleClass="p-datatable-sm">

    <ng-template pTemplate="header">
      <tr class="text-sm">
        <th class="w-10">#</th>
        <th class="w-36">RUC</th>
        <th>Razón social</th>
        <th>Dirección</th>
        <th class="w-32">Reg. MTC</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row let-rowIndex="rowIndex">
      <tr>
        <td class="text-stone-400 text-xs">{{ rowIndex + 1 }}</td>
        <td class="font-mono text-sm">{{ row.ruc }}</td>
        <td class="font-medium text-sm">{{ row.razon_social }}</td>
        <td class="text-sm text-stone-500">{{ row.direccion }}</td>
        <td class="font-mono text-xs text-stone-500">{{ row.nro_reg_mtc }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center py-8 text-stone-400 text-sm">
          No hay empresas de transporte registradas
        </td>
      </tr>
    </ng-template>

  </p-table>

</app-modal>
