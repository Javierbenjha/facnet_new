<app-modal
  [(visible)]="visible"
  title="Cuentas bancarias"
  icon="pi pi-building"
  iconColor="info"
  size="lg">

  <div class="flex items-center justify-between mb-3">
    <span class="text-sm text-stone-400">
      {{ rows().length }} cuenta{{ rows().length !== 1 ? 's' : '' }} registrada{{ rows().length !== 1 ? 's' : '' }}
    </span>
  </div>

  <p-table
    [value]="rows()"
    [loading]="loading()"
    dataKey="id_banco"
    styleClass="p-datatable-sm">

    <ng-template pTemplate="header">
      <tr class="text-sm">
        <th class="w-10">#</th>
        <th>Descripción</th>
        <th class="w-48">N° Cuenta</th>
        <th class="w-28">Moneda</th>
        <th class="w-28 text-center">Estado</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row let-rowIndex="rowIndex">
      <tr>
        <td class="text-stone-400 text-xs">{{ rowIndex + 1 }}</td>
        <td class="font-medium text-sm">{{ row.descripcion }}</td>
        <td class="font-mono text-sm text-stone-500">{{ row.nrocuenta }}</td>
        <td>
          <p-tag [value]="row.tipo_moneda" severity="secondary" />
        </td>
        <td class="text-center">
          <p-tag
            [value]="row.active ? 'Activo' : 'Inactivo'"
            [severity]="row.active ? 'success' : 'danger'" />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center py-8 text-stone-400 text-sm">
          No hay cuentas bancarias registradas
        </td>
      </tr>
    </ng-template>

  </p-table>

</app-modal>
